identity:
  author: gaohaoyv
  name: bookstack_page
  label:
    en_US: BookStack Page
    zh_Hans: BookStack 页面
description:
  en_US: Page-only BookStack online-document datasource.
  zh_Hans: 仅页面范围的 BookStack 在线文档数据源。
provider_type: online_document
parameters:
  - name: page_id
    type: string
    required: true
    form: llm
    label:
      en_US: Page ID
      zh_Hans: 页面 ID
