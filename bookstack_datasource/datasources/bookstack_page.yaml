      en_US: BookStack page identifier for the current Page-only MVP sync path.
      zh_Hans: 当前 Page-only MVP 同步路径使用的 BookStack 页面标识。
output_schema:
  type: object
  properties:
    page_id:
      type: string
      description: BookStack page identifier
    title:
      type: string
      description: BookStack page title
    content:
      type: string
      description: BookStack page content
    source_url:
      type: string
      description: BookStack page source URL
extra:
  python:
    source: datasources/bookstack_page.py
