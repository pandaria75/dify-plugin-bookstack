identity:
  author: gaohaoyv
  name: bookstack_book
  label:
    en_US: BookStack Book
    zh_Hans: BookStack 图书
description:
  en_US: Book-scoped BookStack online-document datasource.
  zh_Hans: 图书范围的 BookStack 在线文档数据源。
provider_type: online_document
parameters:
  - name: book_id
    type: string
    required: true
    form: llm
    label:
      en_US: Book ID
      zh_Hans: 图书 ID
    description:
      en_US: BookStack book identifier used to sync pages under the selected book.
      zh_Hans: 用于同步所选图书下页面的 BookStack 图书标识。
output_schema:
  type: object
  properties:
    source:
      type: string
      description: Stable datasource source identifier
    sync_scope:
      type: string
      description: Requested sync scope for this payload
    sync_source_id:
      type: string
      description: Requested BookStack scope identifier used for sync
    page_id:
      type: string
      description: BookStack page identifier
    bookstack_page_id:
      type: string
      description: Stable BookStack page identifier metadata
    bookstack_book_id:
      type: string
      nullable: true
      description: Related BookStack book identifier when available
    bookstack_chapter_id:
      type: string
      nullable: true
      description: Related BookStack chapter identifier when available
    parent_id:
      type: string
      nullable: true
      description: Parent chapter or book identifier for the synced page
    title:
      type: string
      description: BookStack page title
    url:
      type: string
      nullable: true
      description: BookStack page canonical URL
    tags:
      type: array
      items:
        type: string
      description: Normalized BookStack tag names
    created_at:
      type: string
      nullable: true
      description: BookStack page creation timestamp when available
    updated_at:
      type: string
      nullable: true
      description: BookStack page update timestamp when available
    content_format:
      type: string
      nullable: true
      description: Selected content source field format
    content:
      type: string
      description: BookStack page content
    source_url:
      type: string
      nullable: true
      description: BookStack page source URL
extra:
  python:
    source: datasources/bookstack_book.py
