name: Bug report
description: Report a problem with the plugin.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A short description of the problem.
      placeholder: The plugin did X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest set of steps you can.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Optional details like plugin version, Dify version, or BookStack version.
      placeholder: Plugin version, Dify version, BookStack version
