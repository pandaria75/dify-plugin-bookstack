identity:
  author: gaohaoyv
  name: bookstack
  label:
    en_US: BookStack
    zh_Hans: BookStack
  description:
    en_US: A Dify plugin for publishing, reading, and syncing BookStack pages.
    zh_Hans: 用于发布、读取和同步 BookStack 页面的 Dify 插件。
  icon: icon.svg
  tags:
    - productivity
credentials_for_provider:
  base_url:
    type: text-input
    required: true
    label:
      en_US: Base URL
      zh_Hans: 基础地址
    placeholder:
      en_US: https://docs.example.com
      zh_Hans: https://docs.example.com
  token_id:
    type: secret-input
    required: true
    label:
      en_US: Token ID
      zh_Hans: Token ID
    placeholder:
      en_US: BookStack API token id
      zh_Hans: BookStack API token id
  token_secret:
    type: secret-input
    required: true
    label:
      en_US: Token Secret
      zh_Hans: Token Secret
    placeholder:
      en_US: BookStack API token secret
      zh_Hans: BookStack API token secret
  default_book_id:
    type: text-input
    required: false
    label:
      en_US: Default Book ID
      zh_Hans: 默认 Book ID
  default_chapter_id:
    type: text-input
    required: false
    label:
      en_US: Default Chapter ID
      zh_Hans: 默认 Chapter ID
  timeout_seconds:
    type: text-input
    required: false
    label:
      en_US: Timeout Seconds
      zh_Hans: 超时时间（秒）
  verify_ssl:
    type: boolean
    required: false
    label:
      en_US: Verify SSL
      zh_Hans: 验证 SSL
tools:
  - tools/validate_credentials.yaml
extra:
  python:
    source: provider/bookstack.py
