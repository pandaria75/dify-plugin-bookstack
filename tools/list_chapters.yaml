identity:
  name: list_chapters
  author: gaohaoyv
  label:
    en_US: List Chapters
    zh_Hans: 列出章节
description:
  human:
    en_US: List accessible BookStack chapters and return normalized chapter metadata.
    zh_Hans: 列出可访问的 BookStack 章节并返回标准化章节元数据。
  llm: List accessible BookStack chapters and return normalized chapter metadata.
output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether listing chapters succeeded.
    error:
      type: string
      nullable: true
      description: Error message when listing chapters fails.
    chapters:
      type: array
      description: Normalized BookStack chapters.
      items:
        type: object
        properties:
          chapter_id:
            type: string
            nullable: true
            description: BookStack chapter identifier.
          name:
            type: string
            nullable: true
            description: Chapter name.
          slug:
            type: string
            nullable: true
            description: Chapter slug.
          book_id:
            type: string
            nullable: true
            description: Parent book identifier.
          description:
            type: string
            nullable: true
            description: Chapter description.
          url:
            type: string
            nullable: true
            description: Chapter URL.
          created_at:
            type: string
            nullable: true
            description: Chapter creation timestamp.
          updated_at:
            type: string
            nullable: true
            description: Chapter update timestamp.
          raw:
            type: object
            nullable: true
            description: Original BookStack chapter object.
    count:
      type: integer
      description: Number of returned chapters.
    total:
      type: integer
      nullable: true
      description: Total available chapters when provided by BookStack.
parameters:
  - name: book_id
    type: string
    required: false
    label:
      en_US: Book ID
      zh_Hans: Book ID
    human_description:
      en_US: Optional BookStack book ID to filter chapters.
      zh_Hans: 可选，按 BookStack 书籍 ID 过滤章节。
    llm_description: Optional BookStack book ID to filter chapters.
    form: llm
  - name: count
    type: number
    required: false
    label:
      en_US: Count
      zh_Hans: 数量
    human_description:
      en_US: Optional maximum number of chapters to return.
      zh_Hans: 可选，限制返回的章节数量。
    llm_description: Optional maximum number of chapters to return.
    form: llm
  - name: offset
    type: number
    required: false
    label:
      en_US: Offset
      zh_Hans: 偏移量
    human_description:
      en_US: Optional offset for paginated BookStack chapter results.
      zh_Hans: 可选，BookStack 章节分页结果的偏移量。
    llm_description: Optional offset for paginated BookStack chapter results.
    form: llm
  - name: sort
    type: string
    required: false
    label:
      en_US: Sort
      zh_Hans: 排序
    human_description:
      en_US: Optional sort string using +field, -field, or field. Allowed fields: name, created_at, updated_at, priority.
      zh_Hans: 可选，使用 +field、-field 或 field 的排序字符串。允许字段：name、created_at、updated_at、priority。
    llm_description: Optional sort string using +field, -field, or field. Allowed fields: name, created_at, updated_at, priority.
    form: llm
  - name: filters
    type: string
    required: false
    label:
      en_US: Filters
      zh_Hans: 过滤条件
    human_description:
      en_US: Optional JSON object string of field:operator filters. Allowed fields: name, created_at, updated_at, book_id. Allowed operators: eq, like.
      zh_Hans: 可选，field:operator 过滤条件的 JSON 对象字符串。允许字段：name、created_at、updated_at、book_id。允许操作符：eq、like。
    llm_description: Optional JSON object string of field:operator filters. Allowed fields: name, created_at, updated_at, book_id. Allowed operators: eq, like.
    form: llm
extra:
  python:
    source: tools/list_chapters.py
