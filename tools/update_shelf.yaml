identity:
  name: update_shelf
  author: gaohaoyv
  label:
    en_US: Update Shelf
    zh_Hans: 更新书架
description:
  human:
    en_US: Update a BookStack shelf by ID and return normalized metadata.
    zh_Hans: 根据 ID 更新 BookStack 书架并返回标准化元数据。
  llm: Update a BookStack shelf by ID and return normalized metadata.
output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether updating the shelf succeeded.
    error:
      type: string
      nullable: true
      description: Error message when updating the shelf fails.
    shelf_id:
      type: string
      nullable: true
      description: Updated BookStack shelf identifier.
    name:
      type: string
      nullable: true
      description: Updated shelf name.
    slug:
      type: string
      nullable: true
      description: Updated shelf slug.
    description:
      type: string
      nullable: true
      description: Updated shelf description.
    description_html:
      type: string
      nullable: true
      description: Updated shelf description HTML.
    books:
      type: array
      nullable: true
      description: Raw associated book objects when available.
      items:
        type: object
    tags:
      type: array
      nullable: true
      description: Raw tag objects when available.
      items:
        type: object
    url:
      type: string
      nullable: true
      description: Updated shelf URL.
    created_at:
      type: string
      nullable: true
      description: Shelf creation timestamp.
    updated_at:
      type: string
      nullable: true
      description: Shelf update timestamp.
    created_by:
      type: object
      nullable: true
      description: Raw creator metadata when available.
    updated_by:
      type: object
      nullable: true
      description: Raw updater metadata when available.
    action:
      type: string
      nullable: true
      description: Action label for the shelf result.
    raw:
      type: object
      nullable: true
      description: Original BookStack shelf object.
parameters:
  - name: shelf_id
    type: string
    required: true
    label:
      en_US: Shelf ID
      zh_Hans: 书架 ID
    human_description:
      en_US: The BookStack shelf ID to update.
      zh_Hans: 要更新的 BookStack 书架 ID。
    llm_description: The BookStack shelf ID to update.
    form: llm
  - name: name
    type: string
    required: false
    label:
      en_US: Name
      zh_Hans: 名称
    human_description:
      en_US: Optional updated shelf name.
      zh_Hans: 可选的更新书架名称。
    llm_description: Optional updated shelf name.
    form: llm
  - name: description
    type: string
    required: false
    label:
      en_US: Description
      zh_Hans: 描述
    human_description:
      en_US: Optional updated plain-text description.
      zh_Hans: 可选的更新纯文本描述。
    llm_description: Optional updated plain-text description.
    form: llm
  - name: description_html
    type: string
    required: false
    label:
      en_US: Description HTML
      zh_Hans: 描述 HTML
    human_description:
      en_US: Optional updated HTML description.
      zh_Hans: 可选的更新 HTML 描述。
    llm_description: Optional updated HTML description.
    form: llm
  - name: books
    type: string
    required: false
    label:
      en_US: Books
      zh_Hans: 关联书籍
    human_description:
      en_US: Optional book IDs as a single value or list-like value to associate with the shelf.
      zh_Hans: 可选，单个值或列表式值的书籍 ID，用于关联到书架。
    llm_description: Optional updated associated book IDs.
    form: llm
  - name: tags
    type: string
    required: false
    label:
      en_US: Tags
      zh_Hans: 标签
    human_description:
      en_US: Optional tag text or list-like value forwarded as simple tags.
      zh_Hans: 可选标签文本或列表式值，将作为简单标签传递。
    llm_description: Optional updated tags.
    form: llm
extra:
  python:
    source: tools/update_shelf.py
