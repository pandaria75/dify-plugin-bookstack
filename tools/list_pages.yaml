identity:
  name: list_pages
  author: gaohaoyv
  label:
    en_US: List Pages
    zh_Hans: 列出页面
description:
  human:
    en_US: List accessible BookStack pages and return normalized page metadata.
    zh_Hans: 列出可访问的 BookStack 页面并返回标准化页面元数据。
  llm: List accessible BookStack pages and return normalized page metadata.
output_schema:
  type: object
  properties:
    success:
      type: boolean
      description: Whether listing pages succeeded.
    error:
      type: string
      nullable: true
      description: Error message when listing pages fails.
    pages:
      type: array
      description: Normalized BookStack pages.
      items:
        type: object
        properties:
          page_id:
            type: string
            nullable: true
            description: BookStack page identifier.
          title:
            type: string
            nullable: true
            description: Page title.
          slug:
            type: string
            nullable: true
            description: Page slug.
          book_id:
            type: string
            nullable: true
            description: Parent book identifier.
          chapter_id:
            type: string
            nullable: true
            description: Parent chapter identifier.
          url:
            type: string
            nullable: true
            description: Page URL.
          created_at:
            type: string
            nullable: true
            description: Page creation timestamp.
          updated_at:
            type: string
            nullable: true
            description: Page update timestamp.
          raw:
            type: object
            nullable: true
            description: Original BookStack page object.
    count:
      type: integer
      description: Number of returned pages.
    total:
      type: integer
      nullable: true
      description: Total available pages when provided by BookStack.
parameters:
  - name: book_id
    type: string
    required: false
    label:
      en_US: Book ID
      zh_Hans: Book ID
    human_description:
      en_US: Optional BookStack book ID to filter pages.
      zh_Hans: 可选，按 BookStack 书籍 ID 过滤页面。
    llm_description: Optional BookStack book ID to filter pages.
    form: llm
  - name: chapter_id
    type: string
    required: false
    label:
      en_US: Chapter ID
      zh_Hans: Chapter ID
    human_description:
      en_US: Optional BookStack chapter ID to filter pages.
      zh_Hans: 可选，按 BookStack 章节 ID 过滤页面。
    llm_description: Optional BookStack chapter ID to filter pages.
    form: llm
  - name: count
    type: number
    required: false
    label:
      en_US: Count
      zh_Hans: 数量
    human_description:
      en_US: Optional maximum number of pages to return.
      zh_Hans: 可选，限制返回的页面数量。
    llm_description: Optional maximum number of pages to return.
    form: llm
  - name: offset
    type: number
    required: false
    label:
      en_US: Offset
      zh_Hans: 偏移量
    human_description:
      en_US: Optional offset for paginated BookStack page results.
      zh_Hans: 可选，BookStack 页面分页结果的偏移量。
    llm_description: Optional offset for paginated BookStack page results.
    form: llm
  - name: sort
    type: string
    required: false
    label:
      en_US: Sort
      zh_Hans: 排序
    human_description:
      en_US: Optional sort string using +field, -field, or field. Allowed fields: name, created_at, updated_at, priority.
      zh_Hans: 可选，使用 +field、-field 或 field 的排序字符串。允许字段：name、created_at、updated_at、priority。
    llm_description: Optional sort string using +field, -field, or field. Allowed fields: name, created_at, updated_at, priority.
    form: llm
  - name: filters
    type: string
    required: false
    label:
      en_US: Filters
      zh_Hans: 过滤条件
    human_description:
      en_US: Optional JSON object string of field:operator filters. Allowed fields: name, created_at, updated_at, book_id, chapter_id. Allowed operators: eq, like.
      zh_Hans: 可选，field:operator 过滤条件的 JSON 对象字符串。允许字段：name、created_at、updated_at、book_id、chapter_id。允许操作符：eq、like。
    llm_description: Optional JSON object string of field:operator filters. Allowed fields: name, created_at, updated_at, book_id, chapter_id. Allowed operators: eq, like.
    form: llm
extra:
  python:
    source: tools/list_pages.py
